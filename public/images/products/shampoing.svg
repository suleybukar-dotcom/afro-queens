<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Backgrounds -->
    <radialGradient id="bgGradS" cx="35%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#2D1A06"/>
      <stop offset="60%" stop-color="#150D02"/>
      <stop offset="100%" stop-color="#080501"/>
    </radialGradient>
    <!-- Bottle amber glass -->
    <linearGradient id="amberS" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1C0E00"/>
      <stop offset="20%"  stop-color="#4A2C0A"/>
      <stop offset="45%"  stop-color="#6B3E10"/>
      <stop offset="70%"  stop-color="#3D2208"/>
      <stop offset="100%" stop-color="#100800"/>
    </linearGradient>
    <!-- Glass highlight -->
    <linearGradient id="shineS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,220,160,0.22)"/>
      <stop offset="40%"  stop-color="rgba(255,200,120,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Edge darkening -->
    <radialGradient id="vignetteS" cx="50%" cy="50%" r="50%">
      <stop offset="60%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>
    <!-- Gold gradient -->
    <linearGradient id="goldS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F0C060"/>
      <stop offset="50%"  stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <!-- Orange accent -->
    <linearGradient id="orangeS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F09050"/>
      <stop offset="100%" stop-color="#C4622A"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadowS" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <!-- Soft glow -->
    <filter id="glowS">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Label texture -->
    <linearGradient id="labelS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(244,220,160,0.08)"/>
      <stop offset="100%" stop-color="rgba(200,150,60,0.04)"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="400" height="500" fill="url(#bgGradS)"/>
  <!-- Bokeh spots -->
  <circle cx="60"  cy="80"  r="45" fill="#E07B39" opacity="0.06"/>
  <circle cx="340" cy="400" r="70" fill="#D4A843" opacity="0.05"/>
  <circle cx="350" cy="70"  r="25" fill="#D4A843" opacity="0.04"/>
  <circle cx="50"  cy="420" r="35" fill="#E07B39" opacity="0.04"/>
  <!-- Surface reflection line -->
  <ellipse cx="200" cy="460" rx="120" ry="8" fill="#E07B39" opacity="0.12"/>
  <!-- Surface gradient -->
  <rect x="0" y="440" width="400" height="60" fill="url(#bgGradS)" opacity="0.7"/>
  <!-- Vignette -->
  <rect width="400" height="500" fill="url(#vignetteS)"/>

  <g opacity="0.18">
    <ellipse cx="62" cy="340" rx="10" ry="28" fill="#3D6B45" transform="rotate(-20 62 340)"/>
    <ellipse cx="72" cy="360" rx="7"  ry="20" fill="#2D5234" transform="rotate(-35 72 360)"/>
    <ellipse cx="338" cy="120" rx="9" ry="24" fill="#3D6B45" transform="rotate(15 338 120)"/>
    <ellipse cx="330" cy="140" rx="6" ry="18" fill="#2D5234" transform="rotate(30 330 140)"/>
  </g>

<g filter="url(#shadowS)">
  <!-- Pump tube -->
  <rect x="192" y="65" width="16" height="82" rx="5" fill="url(#amberS)"/>
  <!-- Pump head -->
  <rect x="178" y="52" width="44" height="22" rx="10" fill="#2A1800"/>
  <rect x="183" y="47" width="34" height="14" rx="7" fill="#1A1000"/>
  <!-- Nozzle -->
  <rect x="222" y="56" width="38" height="10" rx="5" fill="#2A1800"/>
  <circle cx="260" cy="61" r="6" fill="#1A1000"/>
  <!-- Nozzle tip detail -->
  <circle cx="260" cy="61" r="3" fill="url(#orangeS)" opacity="0.6"/>

  <!-- Bottle neck -->
  <path d="M 182 138 L 182 148 Q 182 155 175 158 L 165 162 L 235 162 L 225 158 Q 218 155 218 148 L 218 138 Z" fill="url(#amberS)"/>

  <!-- Bottle body -->
  <path d="
    M 165 162
    Q 138 165 132 185
    L 128 320
    Q 127 360 200 362
    Q 273 360 272 320
    L 268 185
    Q 262 165 235 162
    Z" fill="url(#amberS)"/>

  <!-- Glass shine left -->
  <path d="M 138 175 Q 133 220 133 300 L 140 300 Q 140 220 145 175 Z" fill="rgba(255,210,120,0.14)" rx="3"/>
  <!-- Glass shine right edge -->
  <path d="M 258 180 L 262 180 L 265 310 L 261 310 Z" fill="rgba(255,255,255,0.05)"/>

  <!-- Label background -->
  <path d="M 140 200 Q 138 195 200 193 Q 262 195 260 200 L 260 320 Q 262 328 200 330 Q 138 328 140 320 Z"
    fill="url(#labelS)" stroke="rgba(212,168,67,0.3)" stroke-width="0.6"/>

  
  <text x="200" y="-38" text-anchor="middle" font-size="18" fill="url(#goldS)" opacity="0.95" filter="url(#glowS)">♛</text>
  <text x="200" y="-18" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="url(#goldS)" letter-spacing="2.5" font-style="italic" opacity="0.9">Afro Queens</text>
  <line x1="155" y1="-6" x2="245" y2="-6" stroke="url(#goldS)" stroke-width="0.5" opacity="0.5"/>
  <text x="200" y="16" text-anchor="middle" font-family="Georgia,serif" font-size="13.5" fill="white" opacity="0.95" font-weight="700" letter-spacing="0.5">Shampoing</text><text x="200" y="36" text-anchor="middle" font-family="Georgia,serif" font-size="13.5" fill="white" opacity="0.95" font-weight="700" letter-spacing="0.5">Capillaire</text>
  <line x1="160" y1="60" x2="240" y2="60" stroke="url(#goldS)" stroke-width="0.4" opacity="0.35"/>
  <text x="200" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="url(#goldS)" opacity="0.65" letter-spacing="2">NATUREL · 250 ML</text>

  <!-- Bottom highlight -->
  <ellipse cx="200" cy="355" rx="68" ry="7" fill="rgba(100,60,10,0.5)"/>
  <!-- Ground shadow -->
  <ellipse cx="200" cy="460" rx="80" ry="10" fill="#E07B39" opacity="0.08"/>
</g>
</svg>