<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Backgrounds -->
    <radialGradient id="bgGradMK" cx="35%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#2D1A06"/>
      <stop offset="60%" stop-color="#150D02"/>
      <stop offset="100%" stop-color="#080501"/>
    </radialGradient>
    <!-- Bottle amber glass -->
    <linearGradient id="amberMK" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1C0E00"/>
      <stop offset="20%"  stop-color="#4A2C0A"/>
      <stop offset="45%"  stop-color="#6B3E10"/>
      <stop offset="70%"  stop-color="#3D2208"/>
      <stop offset="100%" stop-color="#100800"/>
    </linearGradient>
    <!-- Glass highlight -->
    <linearGradient id="shineMK" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,220,160,0.22)"/>
      <stop offset="40%"  stop-color="rgba(255,200,120,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Edge darkening -->
    <radialGradient id="vignetteMK" cx="50%" cy="50%" r="50%">
      <stop offset="60%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>
    <!-- Gold gradient -->
    <linearGradient id="goldMK" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F0C060"/>
      <stop offset="50%"  stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <!-- Orange accent -->
    <linearGradient id="orangeMK" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F09050"/>
      <stop offset="100%" stop-color="#C4622A"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadowMK" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <!-- Soft glow -->
    <filter id="glowMK">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Label texture -->
    <linearGradient id="labelMK" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(244,220,160,0.08)"/>
      <stop offset="100%" stop-color="rgba(200,150,60,0.04)"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="400" height="500" fill="url(#bgGradMK)"/>
  <!-- Bokeh spots -->
  <circle cx="60"  cy="80"  r="45" fill="#E07B39" opacity="0.06"/>
  <circle cx="340" cy="400" r="70" fill="#D4A843" opacity="0.05"/>
  <circle cx="350" cy="70"  r="25" fill="#D4A843" opacity="0.04"/>
  <circle cx="50"  cy="420" r="35" fill="#E07B39" opacity="0.04"/>
  <!-- Surface reflection line -->
  <ellipse cx="200" cy="460" rx="120" ry="8" fill="#E07B39" opacity="0.12"/>
  <!-- Surface gradient -->
  <rect x="0" y="440" width="400" height="60" fill="url(#bgGradMK)" opacity="0.7"/>
  <!-- Vignette -->
  <rect width="400" height="500" fill="url(#vignetteMK)"/>

  <g opacity="0.18">
    <ellipse cx="62" cy="340" rx="10" ry="28" fill="#3D6B45" transform="rotate(-20 62 340)"/>
    <ellipse cx="72" cy="360" rx="7"  ry="20" fill="#2D5234" transform="rotate(-35 72 360)"/>
    <ellipse cx="338" cy="120" rx="9" ry="24" fill="#3D6B45" transform="rotate(15 338 120)"/>
    <ellipse cx="330" cy="140" rx="6" ry="18" fill="#2D5234" transform="rotate(30 330 140)"/>
  </g>

<g filter="url(#shadowMK)">
  <!-- Lid top -->
  <ellipse cx="200" cy="158" rx="98" ry="20" fill="url(#orangeMK)"/>
  <!-- Lid side -->
  <path d="M 102 158 L 102 185 Q 102 200 200 202 Q 298 200 298 185 L 298 158 Q 298 178 200 178 Q 102 178 102 158 Z" fill="#8B3010"/>
  <!-- Lid highlight -->
  <path d="M 112 162 Q 108 174 112 186 L 120 186 Q 116 174 120 162 Z" fill="rgba(255,180,100,0.2)"/>
  <!-- Logo on lid -->
  <text x="200" y="167" text-anchor="middle" font-size="22" fill="rgba(26,8,0,0.65)">♛</text>
  <text x="200" y="182" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="rgba(26,8,0,0.5)" letter-spacing="2" font-style="italic">Afro Queens</text>

  <!-- Jar body — wider than crème -->
  <path d="
    M 104 200
    Q 102 202 102 212
    L 102 340
    Q 102 368 200 371
    Q 298 368 298 340
    L 298 212
    Q 298 202 296 200
    Z" fill="url(#amberMK)"/>

  <!-- Shine left -->
  <path d="M 110 214 Q 106 278 108 335 L 118 335 Q 116 278 122 214 Z" fill="rgba(255,200,100,0.11)"/>
  <!-- Shine right -->
  <path d="M 285 216 L 291 216 L 291 330 L 285 330 Z" fill="rgba(255,255,255,0.04)"/>

  <!-- Label -->
  <path d="M 114 230 Q 112 226 200 224 Q 288 226 286 230 L 286 344 Q 288 355 200 357 Q 112 355 114 344 Z"
    fill="url(#labelMK)" stroke="rgba(212,168,67,0.28)" stroke-width="0.6"/>

  
  <text x="200" y="-38" text-anchor="middle" font-size="18" fill="url(#goldMK)" opacity="0.95" filter="url(#glowMK)">♛</text>
  <text x="200" y="-18" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="url(#goldMK)" letter-spacing="2.5" font-style="italic" opacity="0.9">Afro Queens</text>
  <line x1="155" y1="-6" x2="245" y2="-6" stroke="url(#goldMK)" stroke-width="0.5" opacity="0.5"/>
  <text x="200" y="16" text-anchor="middle" font-family="Georgia,serif" font-size="13.5" fill="white" opacity="0.95" font-weight="700" letter-spacing="0.5">Masque</text><text x="200" y="36" text-anchor="middle" font-family="Georgia,serif" font-size="13.5" fill="white" opacity="0.95" font-weight="700" letter-spacing="0.5">Capillaire</text>
  <line x1="160" y1="60" x2="240" y2="60" stroke="url(#goldMK)" stroke-width="0.4" opacity="0.35"/>
  <text x="200" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="url(#goldMK)" opacity="0.65" letter-spacing="2">RECONSTITUANT · 300 ML</text>

  <!-- Bottom -->
  <ellipse cx="200" cy="365" rx="96" ry="11" fill="rgba(80,45,5,0.5)"/>
  <ellipse cx="200" cy="460" rx="108" ry="11" fill="#E07B39" opacity="0.08"/>
</g>
</svg>