  <text x="400" y="220" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="white" font-weight="700" opacity="0.95">Routine</text><text x="400" y="272" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="white" font-weight="700" opacity="0.95">Naturelle</text>
  <!-- Subtitle -->
  <text x="400" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E07B39" opacity="0.75" letter-spacing="3">GUIDE DÉBUTANTE</text>
  <!-- Decorative dots -->
