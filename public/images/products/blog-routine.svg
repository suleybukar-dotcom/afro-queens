<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#3D2B0A"/>
      <stop offset="100%" stop-color="#0A0805"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E07B39" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E07B39" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" rx="8"/>
  <ellipse cx="200" cy="150" rx="200" ry="200" fill="url(#glow)"/>
  <ellipse cx="650" cy="350" rx="180" ry="180" fill="#E07B39" opacity="0.06"/>
  <!-- Decorative lines -->
  <line x1="0" y1="420" x2="800" y2="420" stroke="#E07B39" stroke-width="2" opacity="0.3"/>
  <line x1="0" y1="423" x2="800" y2="423" stroke="#E07B39" stroke-width="0.5" opacity="0.15"/>
