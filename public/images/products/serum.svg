<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Backgrounds -->
    <radialGradient id="bgGradDR" cx="35%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#2D1A06"/>
      <stop offset="60%" stop-color="#150D02"/>
      <stop offset="100%" stop-color="#080501"/>
    </radialGradient>
    <!-- Bottle amber glass -->
    <linearGradient id="amberDR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1C0E00"/>
      <stop offset="20%"  stop-color="#4A2C0A"/>
      <stop offset="45%"  stop-color="#6B3E10"/>
      <stop offset="70%"  stop-color="#3D2208"/>
      <stop offset="100%" stop-color="#100800"/>
    </linearGradient>
    <!-- Glass highlight -->
    <linearGradient id="shineDR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,220,160,0.22)"/>
      <stop offset="40%"  stop-color="rgba(255,200,120,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Edge darkening -->
    <radialGradient id="vignetteDR" cx="50%" cy="50%" r="50%">
      <stop offset="60%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>
    <!-- Gold gradient -->
    <linearGradient id="goldDR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F0C060"/>
      <stop offset="50%"  stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <!-- Orange accent -->
    <linearGradient id="orangeDR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F09050"/>
      <stop offset="100%" stop-color="#C4622A"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadowDR" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <!-- Soft glow -->
    <filter id="glowDR">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Label texture -->
    <linearGradient id="labelDR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(244,220,160,0.08)"/>
      <stop offset="100%" stop-color="rgba(200,150,60,0.04)"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="400" height="500" fill="url(#bgGradDR)"/>
  <!-- Bokeh spots -->
  <circle cx="60"  cy="80"  r="45" fill="#D4A843" opacity="0.06"/>
  <circle cx="340" cy="400" r="70" fill="#D4A843" opacity="0.05"/>
  <circle cx="350" cy="70"  r="25" fill="#D4A843" opacity="0.04"/>
  <circle cx="50"  cy="420" r="35" fill="#D4A843" opacity="0.04"/>
  <!-- Surface reflection line -->
  <ellipse cx="200" cy="460" rx="120" ry="8" fill="#D4A843" opacity="0.12"/>
  <!-- Surface gradient -->
  <rect x="0" y="440" width="400" height="60" fill="url(#bgGradDR)" opacity="0.7"/>
  <!-- Vignette -->
  <rect width="400" height="500" fill="url(#vignetteDR)"/>

  <g opacity="0.18">
    <ellipse cx="62" cy="340" rx="10" ry="28" fill="#3D6B45" transform="rotate(-20 62 340)"/>
    <ellipse cx="72" cy="360" rx="7"  ry="20" fill="#2D5234" transform="rotate(-35 72 360)"/>
    <ellipse cx="338" cy="120" rx="9" ry="24" fill="#3D6B45" transform="rotate(15 338 120)"/>
    <ellipse cx="330" cy="140" rx="6" ry="18" fill="#2D5234" transform="rotate(30 330 140)"/>
  </g>

<g filter="url(#shadowDR)">
  <!-- Dropper rubber cap -->
  <ellipse cx="200" cy="95" rx="18" ry="25" fill="url(#goldDR)"/>
  <ellipse cx="200" cy="80" rx="15" ry="14" fill="#8B6914"/>
  <ellipse cx="200" cy="74" rx="11" ry="8"  fill="url(#goldDR)" opacity="0.7"/>
  <!-- Dropper metal collar -->
  <rect x="185" y="115" width="30" height="14" rx="3" fill="url(#goldDR)"/>

  <!-- Slim bottle neck -->
  <path d="M 188 129 L 188 150 Q 188 156 182 159 L 174 162 L 226 162 L 218 159 Q 212 156 212 150 L 212 129 Z" fill="url(#amberDR)"/>

  <!-- Bottle body — tall slim -->
  <path d="
    M 174 162
    Q 155 164 150 180
    L 147 315
    Q 147 355 200 357
    Q 253 355 253 315
    L 250 180
    Q 245 164 226 162
    Z" fill="url(#amberDR)"/>

  <!-- Left shine -->
  <path d="M 157 178 Q 152 240 152 310 L 159 310 Q 158 240 163 178 Z" fill="rgba(255,200,100,0.13)"/>
  <!-- Right shine -->
  <path d="M 242 182 L 246 182 L 248 305 L 244 305 Z" fill="rgba(255,255,255,0.05)"/>

  <!-- Label -->
  <path d="M 158 205 Q 156 200 200 198 Q 244 200 242 205 L 242 315 Q 244 323 200 325 Q 156 323 158 315 Z"
    fill="url(#labelDR)" stroke="rgba(212,168,67,0.3)" stroke-width="0.6"/>

  
  <text x="200" y="-38" text-anchor="middle" font-size="18" fill="url(#goldDR)" opacity="0.95" filter="url(#glowDR)">♛</text>
  <text x="200" y="-18" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="url(#goldDR)" letter-spacing="2.5" font-style="italic" opacity="0.9">Afro Queens</text>
  <line x1="155" y1="-6" x2="245" y2="-6" stroke="url(#goldDR)" stroke-width="0.5" opacity="0.5"/>
  <text x="200" y="16" text-anchor="middle" font-family="Georgia,serif" font-size="13.5" fill="white" opacity="0.95" font-weight="700" letter-spacing="0.5">Sérum</text><text x="200" y="36" text-anchor="middle" font-family="Georgia,serif" font-size="13.5" fill="white" opacity="0.95" font-weight="700" letter-spacing="0.5">Huileux</text>
  <line x1="160" y1="60" x2="240" y2="60" stroke="url(#goldDR)" stroke-width="0.4" opacity="0.35"/>
  <text x="200" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="url(#goldDR)" opacity="0.65" letter-spacing="2">SOIN INTENSIF · 60 ML</text>

  <!-- Liquid drop dripping -->
  <path d="M 200 362 Q 204 370 200 380 Q 196 370 200 362 Z" fill="url(#goldDR)" opacity="0.8"/>

  <!-- Bottom cap -->
  <ellipse cx="200" cy="352" rx="52" ry="8" fill="rgba(80,45,5,0.6)"/>
  <ellipse cx="200" cy="458" rx="65" ry="8" fill="#D4A843" opacity="0.07"/>
</g>
</svg>