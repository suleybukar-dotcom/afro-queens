<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1A1208"/>
      <stop offset="100%" stop-color="#080604"/>
    </radialGradient>
    <linearGradient id="bottle2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A0F00"/>
      <stop offset="35%" stop-color="#4A3010"/>
      <stop offset="65%" stop-color="#3A2508"/>
      <stop offset="100%" stop-color="#0D0A04"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <filter id="shadow2"><feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000" flood-opacity="0.7"/></filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg2)" rx="12"/>
  <ellipse cx="100" cy="100" rx="70" ry="70" fill="#D4A843" opacity="0.05"/>
  <ellipse cx="300" cy="380" rx="90" ry="90" fill="#DAA520" opacity="0.08"/>
  <!-- Drop decoration -->
  <g opacity="0.2" transform="translate(320,80)">
    <path d="M0,-25 Q15,0 0,25 Q-15,0 0,-25Z" fill="#DAA520"/>
  </g>
  <g opacity="0.15" transform="translate(70,380)">
    <path d="M0,-18 Q11,0 0,18 Q-11,0 0,-18Z" fill="#DAA520"/>
  </g>

  <g filter="url(#shadow2)" transform="translate(200,260)">
    <!-- Slim dropper bottle -->
    <rect x="-18" y="-200" width="36" height="30" rx="5" fill="url(#bottle2)"/>
    <path d="M-18,-170 Q-32,-155 -35,-130 L-35,110 Q-35,130 -20,130 L20,130 Q35,130 35,110 L35,-130 Q32,-155 18,-170Z" fill="url(#bottle2)"/>
    <!-- Shine -->
    <path d="M-18,-170 Q-32,-155 -35,-130 L-35,110 Q-35,130 -20,130 L20,130 Q35,130 35,110 L35,-130 Q32,-155 18,-170Z" fill="rgba(255,255,255,0.07)"/>
    <!-- Label -->
    <rect x="-28" y="-55" width="56" height="120" rx="3" fill="rgba(255,255,255,0.03)" stroke="#D4A843" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="0" y="-28" text-anchor="middle" font-size="16" fill="#D4A843" opacity="0.9">♛</text>
    <text x="0" y="-10" text-anchor="middle" font-family="Georgia" font-size="9" fill="#D4A843" letter-spacing="1.5" font-style="italic">Afro Queens</text>
    <line x1="-20" y1="2" x2="20" y2="2" stroke="#D4A843" stroke-width="0.4" opacity="0.5"/>
    <text x="0" y="18" text-anchor="middle" font-family="Georgia" font-size="11" fill="white" opacity="0.9" font-weight="600">Sérum</text><text x="0" y="32" text-anchor="middle" font-family="Georgia" font-size="11" fill="white" opacity="0.9" font-weight="600">Huileux</text>
    <text x="0" y="62" text-anchor="middle" font-family="Arial" font-size="7" fill="#D4A843" opacity="0.6" letter-spacing="1">SÉRUM · PREMIUM</text>
    <!-- Dropper cap -->
    <ellipse cx="0" cy="-210" rx="14" ry="16" fill="url(#gold)"/>
    <rect x="-5" y="-226" width="10" height="18" rx="5" fill="url(#gold)"/>
    <!-- Liquid drop falling -->
    <path d="M0,145 Q4,152 0,160 Q-4,152 0,145Z" fill="#DAA520" opacity="0.7"/>
  </g>
</svg>