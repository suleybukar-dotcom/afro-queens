    <path d="M-42,-160 L-42,-180 L-10,-180 L-10,-200 L10,-200 L10,-180 L42,-180 L42,-160 Q55,-140 58,-100 L58,110 Q58,130 38,130 L-38,130 Q-58,130 -58,110 L-58,-100 Q-55,-140 -42,-160Z" fill="url(#bottle3)"/>
